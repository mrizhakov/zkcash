name: "Automatic Integration Tests for Circuits Compilation"

on:
  pull_request_target:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Circom Setup
        uses: ./.github/actions/circom-setup

      - name: Rust Setup
        uses: ./.github/actions/rust-setup

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install rapidsnark dependencies
        run: |
          sudo apt-get install build-essential cmake libgmp-dev libsodium-dev nasm curl m4

      - name: Set GitHub cloning permissions
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Test with pytest (including integration tests only)
        run: |
          bash "$(find $(python -c "import site; print(site.getsitepackages()[0])") -name tf_bionetta -type d)/repo-install.sh"
          pytest tests/integration 
